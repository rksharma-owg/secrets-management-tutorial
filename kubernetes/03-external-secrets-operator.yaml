# =============================================================================
# 03-external-secrets-operator.yaml - External Secrets Operator (ESO) Examples
# =============================================================================
#
# The External Secrets Operator (ESO) is a Kubernetes operator that syncs
# secrets from external secret management systems (AWS Secrets Manager, Azure
# Key Vault, HashiCorp Vault, GCP Secret Manager, etc.) into Kubernetes Secrets.
#
# WHY USE ESO OVER NATIVE K8S SECRETS?
#   1. Centralized secret management - Secrets live in ONE place (your secret
#      manager), not duplicated across dozens of K8s clusters and namespaces.
#   2. Automatic rotation - ESO can periodically re-sync secrets so your pods
#      always have the latest values without manual intervention.
#   3. Audit logging - External secret managers provide detailed audit trails
#      of who accessed what secret and when. K8s Secrets have no audit trail.
#   4. RBAC integration - Use your cloud provider's IAM/role-based access
#      controls instead of Kubernetes RBAC for secret access.
#   5. Secret versioning - External managers support versioning and rollback.
#      K8s Secrets only keep the current value (no history).
#   6. Multi-cluster consistency - Same ExternalSecret manifest works across
#      all clusters, pulling from the same external source of truth.
#
# HOW ESO WORKS:
#   1. You create a SecretStore (namespace-scoped) or ClusterSecretStore
#      (cluster-wide) that configures HOW to connect to your secret manager.
#   2. You create an ExternalSecret that specifies WHICH secrets to sync.
#   3. The ESO controller reads the ExternalSecret, connects to the secret
#      manager using the SecretStore configuration, fetches the secret, and
#      creates a standard Kubernetes Secret that pods can consume.
#   4. ESO periodically re-syncs (default: every 1m) to pick up changes.
#
# PREREQUISITES:
#   - Install the ESO operator:
#     helm install external-secrets \
#       external-secrets/external-secrets \
#       --namespace external-secrets \
#       --create-namespace
#   - Configure credentials for your secret manager (see 04-irsa-aws-secrets.yaml
#     for AWS IRSA approach, which is recommended over static credentials)
#
# NOTE: Replace placeholder values (ARNs, URLs, names) with your actual values.
# =============================================================================

---
# ===========================================================================
# SECTION 1: AWS SECRETS MANAGER
# ===========================================================================

# ---------------------------------------------------------------------------
# SecretStore: AWS Secrets Manager configuration (namespace-scoped)
# ---------------------------------------------------------------------------
# A SecretStore defines the connection details for ONE external secret provider.
# This one is scoped to the "demo-app" namespace only.
#
# For AWS authentication, we use IRSA (IAM Roles for Service Accounts) which
# is the most secure approach - no static AWS credentials in the cluster.
# See 04-irsa-aws-secrets.yaml for the IRSA setup details.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: demo-app
spec:
  # The provider block tells ESO which backend to use and how to authenticate.
  provider:
    aws:
      # With IRSA, you don't need to specify accessKeyID/secretAccessKey.
      # The ESO controller uses the ServiceAccount's IAM role automatically.
      #
      # If NOT using IRSA, you would reference a K8s Secret containing
      # static AWS credentials (less secure):
      #   auth:
      #     secretRef:
      #       accessKeyIDSecretRef:
      #         name: aws-credentials
#         key: access-key-id
      #       secretAccessKeySecretRef:
      #         name: aws-credentials
#         key: secret-access-key
      service: SecretsManager
      # Region of your AWS Secrets Manager
      region: us-east-1

# ---------------------------------------------------------------------------
# ExternalSecret: Sync a database credential from AWS Secrets Manager
# ---------------------------------------------------------------------------
# This ExternalSecret tells ESO to fetch the secret named "demo-app/database"
# from AWS Secrets Manager and create a K8s Secret named "db-credentials"
# in the "demo-app" namespace.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: demo-app
spec:
  # refreshInterval controls how often ESO re-syncs the secret.
  # For secrets that rotate frequently (e.g., database passwords), use a
  # shorter interval. For relatively static secrets, 1h is sufficient.
  refreshInterval: 15m

  # The SecretStore to use for fetching this secret
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore

  # target defines the K8s Secret that ESO will create/manage.
  # ESO sets the label "managed=true" so it can distinguish its
  # created secrets from manually-created ones.
  target:
    name: db-credentials
    creationPolicy: Owner
    # Optional: template the secret data before writing to the K8s Secret
    # This is useful for combining multiple external values or adding prefixes
    template:
      type: Opaque
      data:
        # Use Go template syntax to reference fetched secret values.
        # Each value from `dataFrom` or `data` is available by its key name.
        DATABASE_URL: "postgresql://{{ .db_username }}:{{ .db_password }}@{{ .db_host }}:5432/mydb?sslmode=require"

  # data defines individual key-value pairs to extract from the external secret.
  # Each entry maps a K8s Secret key to an external secret path + key.
  data:
    - secretKey: db_host
      remoteRef:
        key: demo-app/database
        property: host
    - secretKey: db_port
      remoteRef:
        key: demo-app/database
        property: port
    - secretKey: db_username
      remoteRef:
        key: demo-app/database
        property: username
    - secretKey: db_password
      remoteRef:
        key: demo-app/database
        property: password

---
# ===========================================================================
# SECTION 2: AZURE KEY VAULT
# ===========================================================================

# ---------------------------------------------------------------------------
# SecretStore: Azure Key Vault configuration
# ---------------------------------------------------------------------------
# For Azure, authentication can use:
#   1. Workload Identity (recommended, like IRSA for AWS) - uses OIDC federation
#   2. Service Principal credentials stored in a K8s Secret
# This example shows the Service Principal approach for clarity, but
# Workload Identity is preferred in production.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-kv-store
  namespace: demo-app
spec:
  provider:
    azurekv:
      # URL of your Azure Key Vault
      vaultUrl: "https://my-key-vault.vault.azure.net"
      # Authentication: Service Principal (use Workload Identity in production)
      authType: ServicePrincipal
      tenantId: "AZURE_TENANT_ID_PLACEHOLDER"
      clientId: "AZURE_CLIENT_ID_PLACEHOLDER"
      clientSecret:
        # Reference to a K8s Secret containing the client secret.
        # Create this secret separately with:
        #   kubectl create secret generic azure-sp-credentials \
        #     --from-literal=client-secret='YOUR_CLIENT_SECRET' \
        #     -n demo-app
        secretRef:
          name: azure-sp-credentials
          key: client-secret

# ---------------------------------------------------------------------------
# ExternalSecret: Sync a TLS certificate from Azure Key Vault
# ---------------------------------------------------------------------------
# Azure Key Vault can store certificates, keys, and secrets. This example
# shows fetching a certificate and creating a K8s Secret of type kubernetes.io/tls.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-tls-certificate
  namespace: demo-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: SecretStore
  target:
    name: app-tls-certificate
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    # Azure Key Vault certificates expose both the cert and private key
    - secretKey: tls.crt
      remoteRef:
        key: my-app-tls-cert    # Name of the certificate in Key Vault
        property: x509Certificate  # Azure exposes the cert PEM here
    - secretKey: tls.key
      remoteRef:
        key: my-app-tls-cert
        property: x509PrivateKey  # Azure exposes the private key PEM here

---
# ===========================================================================
# SECTION 3: HASHICORP VAULT
# ===========================================================================

# ---------------------------------------------------------------------------
# SecretStore: HashiCorp Vault configuration
# ---------------------------------------------------------------------------
# ESO can also sync from Vault. This is useful if you're gradually migrating
# from Vault Agent injection to ESO, or if you need to share Vault secrets
# with clusters where Vault Agent Injector isn't installed.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-store
  namespace: demo-app
spec:
  provider:
    vault:
      # Vault server address (internal cluster service)
      server: "http://vault.vault.svc.cluster.local:8200"
      # Vault namespace (enterprise feature, omit if using OSS)
      # namespace: "my-namespace"
      # Authentication: Kubernetes auth method (preferred for K8s workloads)
      auth:
        kubernetes:
          # Path where the Kubernetes auth method is mounted in Vault
          mountPath: "kubernetes"
          # Vault role that maps this SA to a Vault policy
          role: "eso-role"
          # ServiceAccount for the ESO pod (used to get the JWT for auth)
          serviceAccountRef:
            name: eso-sa
            namespace: external-secrets
      # Version of the KV secrets engine: "v2" (default) or "v1"
      version: "v2"

# ---------------------------------------------------------------------------
# ExternalSecret: Sync JWT signing key from Vault
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-signing-key
  namespace: demo-app
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: jwt-signing-key
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: secret/data/demo-app/jwt
        property: signing_key
    - secretKey: jwt-issuer
      remoteRef:
        key: secret/data/demo-app/jwt
        property: issuer

---
# ===========================================================================
# SECTION 4: CLUSTER SECRET STORE (Cluster-Scoped)
# ===========================================================================

# ---------------------------------------------------------------------------
# ClusterSecretStore: Cluster-wide AWS Secrets Manager access
# ---------------------------------------------------------------------------
# A ClusterSecretStore is like a SecretStore but accessible from ANY namespace
# without needing to create a per-namespace SecretStore. This reduces
# configuration duplication in multi-tenant clusters.
#
# SECURITY WARNING: Because any namespace can reference this store, ensure
# the underlying IAM permissions are scoped appropriately. Consider using
# namespace-scoped SecretStores if different teams manage different secrets.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-cluster-store
  # ClusterSecretStore has no namespace (it's cluster-scoped)
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # With IRSA, no explicit credentials needed.
      # The ESO controller's ServiceAccount IAM role is used.

---
# ===========================================================================
# SECTION 5: SAMPLE CONSUMERS - Deployments that use ESO-created Secrets
# ===========================================================================

# ---------------------------------------------------------------------------
# Deployment: App consuming the ESO-synced database credentials
# ---------------------------------------------------------------------------
# This Deployment shows how pods consume the K8s Secret that ESO creates.
# From the pod's perspective, it's just a regular K8s Secret - it doesn't
# know (or care) that ESO synced it from AWS Secrets Manager.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: demo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: my-registry/api-server:latest
          ports:
            - containerPort: 8080
          # The env vars reference the K8s Secret that ESO creates and manages.
          # If the secret in AWS changes, ESO re-syncs and updates the K8s Secret,
          # but pods need to be restarted to pick up the new values.
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials       # ESO-created Secret
                  key: DATABASE_URL          # Templated key from ExternalSecret
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db_host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db_password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi