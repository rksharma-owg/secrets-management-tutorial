# =============================================================================
# 05-native-k8s-secrets.yaml - Native Kubernetes Secrets (WITH CAVEATS)
# =============================================================================
#
# ============================================================================
# ⚠️  WARNING: NATIVE K8S SECRETS ARE NOT RECOMMENDED FOR PRODUCTION  ⚠️
# ============================================================================
#
# This file demonstrates how native Kubernetes Secrets work so you understand
# the mechanism. However, for production workloads, you should use:
#
#   - External Secrets Operator (ESO) — see 03-external-secrets-operator.yaml
#   - HashiCorp Vault with Agent Injection — see 02-vault-agent-injector.yaml
#   - IRSA + AWS Secrets Manager — see 04-irsa-aws-secrets.yaml
#
# ============================================================================
# WHY NATIVE K8S SECRETS ARE PROBLEMATIC FOR PRODUCTION
# ============================================================================
#
# 1. BASE64 IS NOT ENCRYPTION
#    Kubernetes Secrets are stored in etcd as base64-encoded values.
#    Base64 is an ENCODING scheme, NOT encryption. Anyone who can read the
#    secret resource (kubectl get secret -o yaml) can decode it trivially:
#
#      echo "c3VwZXJzZWNyZXRwYXNzd29yZA==" | base64 -d
#      # Output: supersecretpassword
#
#    The data is obfuscated but not confidential. This is a common
#    misconception that leads to false security confidence.
#
# 2. NO SECRET ROTATION SUPPORT
#    Kubernetes has NO built-in mechanism to rotate secrets. If a password
#    is compromised or expires, you must:
#      a. Update the Secret manually (or via CI/CD)
#      b. Restart all pods that reference the secret (env vars are immutable
#         after pod start; volume mounts only update on kubelet sync which
#         has a 1-minute default interval)
#    This means rotation often requires a deployment rollout, causing downtime
#    or at minimum a rolling restart of all affected pods.
#
#    In contrast, Vault Agent automatically renews tokens and re-fetches
#    secrets. ESO periodically re-syncs from external secret managers.
#
# 3. NO AUDIT LOGGING
#    Kubernetes does not log WHO read a secret, WHEN they read it, or WHAT
#    they did with it. You can enable audit logging for the API server, but
#    it logs at the request level (which user made which API call), not at
#    the secret access level (which specific secret was consumed by which pod).
#
#    External secret managers (Vault, AWS SM, Azure KV) provide detailed
#    audit logs: every secret access, every authentication event, every
#    policy evaluation is logged with timestamps and identities.
#
# 4. etcd ENCRYPTION IS REQUIRED BUT OFTEN MISSED
#    Without EncryptionConfiguration, secrets are stored in PLAINTEXT in etcd.
#    Even with etcd encryption enabled:
#      - The encryption key is stored on the control plane nodes
#      - Anyone with etcd access (backup files, etcd snapshots, etcdctl)
#        can potentially decrypt the secrets
#      - Key rotation requires re-encrypting all secrets
#
#    To enable etcd encryption, you must configure the API server's
#    --encryption-provider-config flag. This is NOT enabled by default.
#
# 5. NO FINE-GRAINED ACCESS CONTROL
#    Kubernetes RBAC allows you to control who can read/write Secret objects,
#    but you cannot control access to INDIVIDUAL keys within a secret, or
#    implement time-based access, conditional access, or approval workflows.
#
#    Vault policies allow extremely fine-grained control: "this service
#    account can read the 'password' key but not the 'api_key' key, only
#    during business hours, only from pods with label env=production."
#
# 6. SECRET SCOPING IS LIMITED
#    K8s Secrets are namespace-scoped. To share secrets across namespaces,
#    you must either duplicate them (drift risk) or use tools like
#    kube-fledged, Velero, or manual scripting.
#
#    External secret managers provide a single source of truth accessible
#    from any cluster, any namespace.
#
# 7. NO SECRET VERSIONING
#    When you update a K8s Secret, the previous value is gone forever.
#    If an update breaks something, you cannot roll back to the previous
#    secret value (unless you have it in Git or a backup).
#
#    Vault, AWS SM, and Azure KV all support secret versioning.
#
# ============================================================================
# WHEN ARE NATIVE K8S SECRETS ACCEPTABLE?
# ============================================================================
#   - Development/testing environments (non-sensitive data)
#   - Publicly-known configuration values that happen to use the Secret type
#   - Pull secrets for container registries (unavoidable with K8s)
#   - TLS certificates managed by cert-manager (cert-manager creates Secrets)
#   - As a TEMPORARY stepping stone while implementing ESO or Vault
# =============================================================================

---
# ---------------------------------------------------------------------------
# Secret: Database credentials (base64-encoded)
# ---------------------------------------------------------------------------
# This demonstrates how a K8s Secret is structured. The values in the `data`
# field MUST be base64-encoded. The `stringData` field accepts plaintext and
# the API server encodes it automatically.
#
# SECURITY NOTE: Even with RBAC restricting access, anyone who can exec into
# a pod that has these as environment variables can read them via:
#   kubectl exec <pod> -- env | grep DB_PASSWORD
#
# And anyone who can describe the secret can see the base64 values:
#   kubectl get secret db-credentials -o yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: demo-app
  labels:
    app.kubernetes.io/name: demo-app
    # Label to identify secrets that should be migrated to ESO
    secrets-management: native   # TODO: migrate to ESO
  # Optional: annotations for tracking secret provenance and rotation
  annotations:
    description: "Database credentials - PLANNED FOR MIGRATION TO ESO"
    last-rotated: "2024-01-15"
    # This is NOT a real rotation mechanism - just a manual tracking hint
type: Opaque
# stringData accepts plaintext values (K8s API server encodes to base64).
# Using stringData here for readability; in CI/CD pipelines you'd typically
# use `data` with pre-encoded values.
stringData:
  # These are PLAINTEXT values that K8s will base64-encode when storing.
  # In production, these should come from your CI/CD pipeline, never
  # committed to source control.
  DB_HOST: "db.production.internal"
  DB_PORT: "5432"
  DB_USERNAME: "app_user"
  DB_PASSWORD: "CHANGE-ME-In-Production-This-Is-Example-Only"
  # NEVER put real passwords here. Use:
  #   - ESO to sync from AWS Secrets Manager / Vault / Azure Key Vault
  #   - Sealed Secrets (bitnami-labs/sealed-secrets) for GitOps workflows
  #   - SOPS (mozilla/sops) for encrypted-at-rest secrets in Git

---
# ---------------------------------------------------------------------------
# Deployment: Consuming secrets via ENVIRONMENT VARIABLES
# ---------------------------------------------------------------------------
# This is the most common pattern but has a significant limitation:
# environment variables are set ONCE at container startup and cannot be
# updated without restarting the pod.
#
# When the underlying Secret is updated, existing pods continue using the
# OLD values until they are restarted. This is why secret rotation with
# native K8s Secrets requires pod restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-env-secrets
  namespace: demo-app
  labels:
    app.kubernetes.io/name: app-env-secrets
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: app-env-secrets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-env-secrets
    spec:
      containers:
        - name: app
          image: my-registry/app:latest
          ports:
            - containerPort: 8080
          env:
            # Each environment variable references a specific key in the Secret.
            # The syntax is: secretKeyRef.name = Secret name, key = data key.
            #
            # If the Secret doesn't exist or the key is missing, the pod will
            # FAIL to start (unless optional: true is set).
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_HOST
                  # optional: true  # Uncomment to allow missing keys
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PORT
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

---
# ---------------------------------------------------------------------------
# Deployment: Consuming secrets via VOLUME MOUNT
# ---------------------------------------------------------------------------
# This pattern mounts the Secret as files in a directory. The advantage over
# environment variables is that the kubelet periodically syncs the mounted
# files (default: every 1 minute). So if the Secret is updated, the files
# will eventually reflect the new values WITHOUT a pod restart.
#
# LIMITATIONS:
#   - The app must watch the file for changes (most apps don't do this)
#   - There's a 1-minute delay before updates appear
#   - The files are stored as tmpfs (in-memory), so they don't persist on disk
#   - File permissions can be set (default: 0644 for files, 0755 for directory)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-volume-secrets
  namespace: demo-app
  labels:
    app.kubernetes.io/name: app-volume-secrets
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: app-volume-secrets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-volume-secrets
    spec:
      containers:
        - name: app
          image: my-registry/app:latest
          ports:
            - containerPort: 8080
          env:
            # Tell the app where to find the mounted secret files
            - name: SECRETS_DIR
              value: "/etc/secrets/db"
            # The app reads files from SECRETS_DIR:
            #   /etc/secrets/db/DB_HOST       -> "db.production.internal"
            #   /etc/secrets/db/DB_PORT       -> "5432"
            #   /etc/secrets/db/DB_USERNAME   -> "app_user"
            #   /etc/secrets/db/DB_PASSWORD   -> "CHANGE-ME-..."
          volumeMounts:
            # Mount the Secret at a specific directory.
            # Each key in the Secret becomes a file in this directory.
            - name: db-secret-volume
              mountPath: "/etc/secrets/db"
              # readOnly: true  # Always mount secrets as read-only (default)
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        # The volume source references the Secret by name.
        # The kubelet creates tmpfs-backed files for each key.
        #
        # You can control the file mode with defaultMode:
        #   defaultMode: 0400  # Owner read-only (most secure)
        - name: db-secret-volume
          secret:
            secretName: db-credentials
            # Optional: only mount specific keys from the Secret
            # items:
            #   - key: DB_PASSWORD
            #     path: db-password-file
            # Optional: set file permissions (octal)
            defaultMode: 0400