# =============================================================================
# 04-irsa-aws-secrets.yaml - IAM Roles for Service Accounts (IRSA)
# =============================================================================
#
# IRSA (IAM Roles for Service Accounts) is an AWS EKS feature that allows you
# to assign IAM roles to Kubernetes pods using their ServiceAccount, WITHOUT
# storing static AWS credentials (access key + secret key) in the cluster.
#
# ============================================================================
# IRSA AUTHENTICATION FLOW (OIDC Federation)
# ============================================================================
#
# Step 1: EKS cluster has an OIDC provider (IAM Identity Provider) configured
#         during cluster creation. This allows IAM to verify Kubernetes tokens.
#
# Step 2: You create an IAM Role with a trust policy that says:
#         "Allow the OIDC provider for my EKS cluster to assume this role,
#          BUT only when the Kubernetes token's 'sub' claim matches a specific
#          ServiceAccount (e.g., system:serviceaccount:demo-app:app-sa)"
#
# Step 3: The IAM role has an inline or attached policy granting permissions
#         (e.g., "secretsmanager:GetSecretValue" for specific secrets).
#
# Step 4: When a pod using the annotated ServiceAccount starts, the EKS
#         Pod Identity Webhook mutates the pod to:
#         a. Set AWS_WEB_IDENTITY_TOKEN_FILE env var (path to the SA JWT)
#         b. Set AWS_ROLE_ARN env var
#         c. Set AWS_DEFAULT_AUTHORITY env var
#         d. Mount the SA token as a projected volume at the token file path
#
# Step 5: The AWS SDK inside the pod detects these env vars and automatically:
#         a. Reads the JWT token from the file
#         b. Calls AWS STS AssumeRoleWithWebIdentity
#         c. IAM validates the JWT against the EKS OIDC provider
#         d. IAM checks the trust policy's condition (sub claim match)
#         e. STS returns temporary AWS credentials (access key, secret key,
#            session token) - valid for 1 hour, auto-rotated
#
# Step 6: The AWS SDK uses these temporary credentials for API calls.
#         No static credentials are ever stored in the cluster.
#
# ============================================================================
# AWS IAM POLICY FOR SECRETS MANAGER ACCESS (Reference - apply via AWS console/CLI)
# ============================================================================
#
# The following IAM policy should be attached to the IAM role. It grants
# read-only access to specific secrets in AWS Secrets Manager:
#
# {
#   "Version": "2012-10-17",
#   "Statement": [
#     {
#       "Effect": "Allow",
#       "Action": [
#         "secretsmanager:GetSecretValue",
#         "secretsmanager:DescribeSecret"
#       ],
#       "Resource": [
#         "arn:aws:secretsmanager:us-east-1:123456789012:secret:demo-app/database-*",
#         "arn:aws:secretsmanager:us-east-1:123456789012:secret:demo-app/api-keys-*"
#       ]
#     },
#     {
#       "Effect": "Allow",
#       "Action": [
#         "kms:Decrypt"
#       ],
#       "Resource": [
#         "arn:aws:kms:us-east-1:123456789012:key/YOUR_KMS_KEY_ID"
#       ],
#       "Condition": {
#         "StringEquals": {
#           "kms:DecryptContext": {
#             "aws:secretsmanager:secret-arn": "arn:aws:secretsmanager:us-east-1:123456789012:secret:demo-app/database-*"
#           }
#         }
#       }
#     }
#   ]
# }
#
# ============================================================================
# AWS IAM TRUST POLICY (Reference - configure on the IAM role)
# ============================================================================
#
# {
#   "Version": "2012-10-17",
#   "Statement": [
#     {
#       "Effect": "Allow",
#       "Principal": {
#         "Federated": "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/EXAMPLED539D4633E53DE1B716D3041E"
#       },
#       "Action": "sts:AssumeRoleWithWebIdentity",
#       "Condition": {
#         "StringEquals": {
#           "oidc.eks.us-east-1.amazonaws.com/id/EXAMPLED539D4633E53DE1B716D3041E:aud": "sts.amazonaws.com",
#           "oidc.eks.us-east-1.amazonaws.com/id/EXAMPLED539D4633E53DE1B716D3041E:sub": "system:serviceaccount:demo-app:app-sa"
#         }
#       }
#     }
#   ]
# }
# =============================================================================

---
# ---------------------------------------------------------------------------
# ServiceAccount with IAM Role annotation
# ---------------------------------------------------------------------------
# This is the CRUCIAL annotation that enables IRSA. The EKS Pod Identity
# Webhook watches for ServiceAccounts with this annotation and mutates
# pods to inject the OIDC token and AWS_ROLE_ARN environment variable.
#
# Format: eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
#
# IMPORTANT: The IAM role's trust policy MUST include the 'sub' condition
# matching this exact ServiceAccount:
#   system:serviceaccount:<NAMESPACE>:<SERVICE_ACCOUNT_NAME>
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: demo-app
  labels:
    app.kubernetes.io/name: demo-app
  annotations:
    # -------------------------------------------------------------------
    # IRSA ANNOTATION - This is the key that enables the entire flow.
    # Replace with your actual IAM role ARN.
    # -------------------------------------------------------------------
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/demo-app-secrets-reader-role"

---
# ---------------------------------------------------------------------------
# Deployment: Application using IRSA to access AWS Secrets Manager
# ---------------------------------------------------------------------------
# This Deployment demonstrates two approaches:
#   1. Using the AWS SDK directly (app fetches secrets itself)
#   2. Using ESO with IRSA (recommended - see 03-external-secrets-operator.yaml)
#
# This example shows approach #1: the application uses the AWS SDK to
# fetch secrets at runtime, using the temporary credentials provided by IRSA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-secrets-app
  namespace: demo-app
  labels:
    app.kubernetes.io/name: aws-secrets-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aws-secrets-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aws-secrets-app
      # Optional: EKS-specific annotations for fine-tuning IRSA behavior
      annotations:
        # Reduce the token audience to only sts.amazonaws.com (security best practice)
        # This limits what the OIDC token can be used for
        eks.amazonaws.com/audience: "sts.amazonaws.com"
    spec:
      # CRITICAL: Use the ServiceAccount with the IAM role annotation.
      # If you use the default SA, no IAM role is assigned, and the pod
      # cannot authenticate to AWS services via IRSA.
      serviceAccountName: app-sa
      containers:
        - name: app
          image: my-registry/aws-secrets-app:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            # -----------------------------------------------------------------
            # These env vars are set AUTOMATICALLY by the EKS Pod Identity
            # Webhook when it sees the ServiceAccount's role-arn annotation.
            # You do NOT need to set these manually. They are listed here
            # for educational purposes so you understand what the webhook does.
            # -----------------------------------------------------------------
            #
            # AWS_ROLE_ARN: The IAM role to assume
            #   (value: arn:aws:iam::123456789012:role/demo-app-secrets-reader-role)
            #
            # AWS_WEB_IDENTITY_TOKEN_FILE: Path to the mounted SA JWT token
            #   (value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token)
            #
            # AWS_DEFAULT_AUTHORITY: The OIDC authority for token validation
            #   (value: oidc.eks.us-east-1.amazonaws.com/id/EXAMPLE...)
            #
            # The AWS SDK (boto3, AWS SDK for Go/Java/JS, etc.) automatically
            # reads these env vars and handles the AssumeRoleWithWebIdentity
            # flow. No code changes needed beyond using the SDK normally.

            # Tell the app which secrets to fetch from AWS Secrets Manager.
            # The app uses the AWS SDK to retrieve these at startup.
            - name: AWS_REGION
              value: "us-east-1"
            - name: DB_SECRET_NAME
              value: "demo-app/database"
            - name: API_KEY_SECRET_NAME
              value: "demo-app/api-keys"

            # -----------------------------------------------------------------
            # BEST PRACTICE: Use ESO + IRSA instead of app-level fetching.
            # With ESO, the app doesn't need to know about AWS at all.
            # ESO fetches secrets and creates K8s Secrets that the app
            # consumes via standard K8s mechanisms (env vars, volumes).
            #
            # See 03-external-secrets-operator.yaml for the ESO approach.
            # -----------------------------------------------------------------

          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          # Readiness/liveness probes for the application
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15

---
# ---------------------------------------------------------------------------
# Bonus: ServiceAccount for ESO with IRSA
# ---------------------------------------------------------------------------
# If you're using External Secrets Operator (from 03-external-secrets-operator.yaml)
# with IRSA, the ESO controller's ServiceAccount needs the IAM role annotation.
#
# The ESO Helm chart supports setting this during installation:
#   helm install external-secrets external-secrets/external-secrets \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=arn:aws:iam::123456789012:role/eso-secrets-reader-role
#
# Alternatively, you can patch the ServiceAccount after installation:
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  labels:
    app.kubernetes.io/name: external-secrets
  annotations:
    # This IAM role needs broader permissions than the app SA because
    # ESO fetches secrets on behalf of ALL namespaces/apps.
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/eso-secrets-reader-role"